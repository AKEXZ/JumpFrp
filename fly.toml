app = "jumpfrp"
primary_region = "sin"

[build]

[env]
  APP_MODE = "release"
  SERVER_ADDR = ":8080"
  DB_PATH = "/data/jumpfrp.db"

[mounts]
  source = "jumpfrp_data"
  destination = "/data"

[[services]]
  protocol = "tcp"
  internal_port = 8080

  [services.concurrency]
    type = "connections"
    hard_limit = 500
    soft_limit = 400

  [[services.ports]]
    port = 80
    handlers = ["http"]
    [services.ports.http_options]
      redirect_http = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.http_checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"
