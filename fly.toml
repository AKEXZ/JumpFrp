app = "jumpfrp"
primary_region = "sin"

[build]

[env]
  GIN_MODE = "release"
  SERVER_ADDR = ":8080"
  DB_PATH = "/data/jumpfrp.db"
  TZ = "Asia/Shanghai"

[mounts]
  source = "jumpfrp_data"
  destination = "/data"

[[http_service]]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 500
    soft_limit = 400

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[checks]
  [checks.health]
    port = 8080
    type = "http"
    interval = "30s"
    timeout = "10s"
    grace_period = "30s"
    method = "GET"
    path = "/health"
